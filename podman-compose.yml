services:
  travel-quizzer:
    build:
      context: .
      dockerfile: Containerfile
    container_name: travel-quizzer
    ports:
      - "9696:5000"
    volumes:
      - ./frontend:/app/frontend:ro
      - ./data:/app/data:ro
      - ./media:/app/media:ro
    environment:
      QUIZ_DATABASE_URL: postgresql+psycopg2://quizzer:quizzer_pass@postgres:5432/travel_quizzer
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - travel-quizzer-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: travel_quizzer
      POSTGRES_USER: quizzer
      POSTGRES_PASSWORD: quizzer_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizzer -d travel_quizzer"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - travel-quizzer-net

networks:
  travel-quizzer-net:
    driver: bridge

volumes:
  pgdata:
