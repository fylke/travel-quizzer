services:
  travel-quizzer:
    build:
      context: .
      dockerfile: Containerfile
    container_name: travel-quizzer
    ports:
      - "9696:5000"
    volumes:
      - ./frontend:/app/frontend:ro
      - ./data:/app/data:ro
      - ./media:/app/media:ro
    environment:
      QUIZ_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-quizzer}:${POSTGRES_PASSWORD:-quizzer_pass}@postgres:5432/${POSTGRES_DB:-travel_quizzer}
      SMTP_HOST:
      SMTP_PORT: 587
      SMTP_USERNAME:
      SMTP_PASSWORD:
      SMTP_FROM_ADDRESS:
      SMTP_USE_TLS: "false"
    depends_on:
      postgres:
        condition: service_healthy
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 200
    mem_limit: 512m
    cpus: 1.0
    ulimits:
      nofile:
        soft: 1024
        hard: 2048
      nproc: 256
    networks:
      - travel-quizzer-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-travel_quizzer}
      POSTGRES_USER: ${POSTGRES_USER:-quizzer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quizzer_pass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quizzer} -d ${POSTGRES_DB:-travel_quizzer}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - travel-quizzer-net

networks:
  travel-quizzer-net:
    driver: bridge

volumes:
  pgdata:
