services:
  travel-quizzer:
    build:
      context: .
      dockerfile: Containerfile
    container_name: travel-quizzer
    ports:
      - "9696:5000"
    volumes:
      - ./frontend:/app/frontend:ro
    environment: []
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/quiz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
