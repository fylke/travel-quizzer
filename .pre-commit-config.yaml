fail_fast: true
repos:
- repo: local
  hooks:
    - id: black
      name: black
      entry: uv run black
      language: system
      types: [file, python]
      files: '^(src|test)/'
    - id: isort
      name: isort
      entry: uv run isort
      language: system
      types: [file, python]
      files: '^(src|test)/'
