<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jasmine Spec Runner</title>
    <!-- Jasmine 5.x CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jasmine/5.1.1/jasmine.min.css">
    <!-- Jasmine 5.x Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jasmine/5.1.1/jasmine.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jasmine/5.1.1/jasmine-html.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jasmine/5.1.1/boot0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jasmine/5.1.1/boot1.min.js"></script>
    <!-- fast-check for property-based testing (IIFE bundle, exposes global `fc`) -->
    <script src="fast-check.iife.js"></script>
</head>
<body>
    <!-- Minimal DOM fixtures needed by app.js DOMContentLoaded listener -->
    <div class="container">
        <div id="welcomeScreen" class="screen"></div>
        <div id="statusScreen" class="screen hidden"></div>
        <div id="quizScreen" class="screen hidden"></div>
        <div id="feedbackScreen" class="screen hidden"></div>
        <div id="resultsScreen" class="screen hidden"></div>
        <div id="adminScreen" class="screen hidden"></div>
        <input type="text" id="answerInput">
        <input type="email" id="email">
        <input type="password" id="password">
    </div>

    <!-- Rules Modal fixture for DOMContentLoaded listener -->
    <div id="rulesModal" class="modal-overlay" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="rulesModalTitle">
        <div class="modal-card rules-modal-card">
            <h2 id="rulesModalTitle"></h2>
            <div id="rulesModalContent" class="rules-modal-content"></div>
            <div class="modal-buttons">
                <button id="rulesModalCloseBtn" class="btn btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <!-- Source files under test -->
    <script src="../frontend/app.js"></script>
    <script src="../frontend/markdown.js"></script>
    <script src="../frontend/modal.js"></script>
    <script src="../frontend/admin.js"></script>

    <!-- Spec files -->
    <script src="spec/adminSpec.js"></script>
    <script src="spec/statsSpec.js"></script>
    <script src="spec/wrongGuessAnimationSpec.js"></script>
    <script src="spec/wrongGuessAnimationPropertySpec.js"></script>
    <script src="spec/welcomeScreenBugConditionSpec.js"></script>
    <script src="spec/welcomeScreenPreservationSpec.js"></script>
    <script src="spec/forgotPasswordSpec.js"></script>
    <script src="spec/markdownRendererSpec.js"></script>
    <script src="spec/quizTypeButtonsSpec.js"></script>
    <script src="spec/specificQuizSpec.js"></script>
</body>
</html>
