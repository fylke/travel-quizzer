name: Nightly E2E Tests

on:
  schedule:
    - cron: '0 3 * * *' # Every day at 03:00 UTC
  workflow_dispatch: # Allow manual triggers

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --group test

      - name: Ensure database directory exists
        run: mkdir -p database

      - name: Patch Playwright platform detection for Ubuntu
        run: |
          uv run python -c "
          import pathlib, playwright, glob
          base = pathlib.Path(playwright.__file__).parent / 'driver' / 'package' / 'lib'
          targets = list(base.glob('**/hostPlatform.js')) + list(base.glob('coreBundle.js'))
          for p in targets:
              if p.exists():
                  text = p.read_text()
                  text = text.replace('\"ubuntu\" + distroInfo.version + archSuffix', '\"ubuntu24.04\" + archSuffix')
                  text = text.replace(\"'ubuntu' + distroInfo.version + archSuffix\", \"'ubuntu24.04' + archSuffix\")
                  p.write_text(text)
          "

      - name: Install Playwright browsers
        run: uv run playwright install chromium firefox webkit

      - name: Run E2E tests
        env:
          QUIZ_DATABASE_URL: sqlite:///./database/ci_quiz_data.db
        run: uv run e2e-test
