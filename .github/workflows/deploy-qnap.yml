name: Deploy to QNAP Container Station

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}
  CONTAINER_NAME: travel-quizzer

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.resolve-image-ref.outputs.image_ref }}
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build container image (local)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: ./Containerfile
          load: true
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Generate Trivy SARIF report
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          vuln-type: os,library
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Enforce vulnerability gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          vuln-type: os,library
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push scanned image tags
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Resolve immutable image reference
        id: resolve-image-ref
        run: |
          IMAGE_REF=$(docker image inspect --format='{{index .RepoDigests 0}}' ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }})
          if [ -z "$IMAGE_REF" ]; then
            echo "Failed to resolve immutable image reference" >&2
            exit 1
          fi
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Generate container image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ steps.resolve-image-ref.outputs.image_ref }}
          format: spdx-json
          artifact-name: container-image-sbom.spdx.json
          upload-release-assets: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac

      - name: Sign image with keyless Cosign
        run: cosign sign --yes "${{ steps.resolve-image-ref.outputs.image_ref }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      issues: write

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac

      - name: Verify signed image
        run: |
          cosign verify "${{ needs.build-and-push.outputs.image_ref }}" \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/deploy-qnap.yml@refs/tags/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      - name: Deploy to QNAP via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.QNAP_HOST }}
          port: ${{ secrets.QNAP_SSH_PORT }}
          username: ${{ secrets.QNAP_USER }}
          key: ${{ secrets.QNAP_SSH_KEY }}
          script: |
            resolve_docker() {
              if command -v docker >/dev/null 2>&1; then
                command -v docker
                return 0
              fi
              for candidate in \
                /share/CACHEDEV2_DATA/.qpkg/container-station/bin/docker \
                /share/CACHEDEV2_DATA/.qpkg/ContainerStation/bin/docker; do
                if [ -x "$candidate" ]; then
                  echo "$candidate"
                  return 0
                fi
              done
              echo "Docker CLI not found on QNAP host" >&2
              return 1
            }

            DOCKER_BIN=$(resolve_docker)

            # Log in to GHCR
            echo "${{ secrets.QNAP_GHCR_TOKEN }}" | "$DOCKER_BIN" login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the exact immutable image reference.
            "$DOCKER_BIN" pull ${{ needs.build-and-push.outputs.image_ref }}

            ROLLBACK_DEPTH=3
            rollback_name() {
              echo "${{ env.CONTAINER_NAME }}-rollback-$1"
            }

            # Rotate rollback generations: 2->3, 1->2, current->1.
            OLDEST=$(rollback_name "$ROLLBACK_DEPTH")
            if "$DOCKER_BIN" ps -a --format '{{.Names}}' | grep -Fx "$OLDEST" >/dev/null 2>&1; then
              "$DOCKER_BIN" rm -f "$OLDEST" >/dev/null 2>&1 || true
            fi

            for i in $(seq "$ROLLBACK_DEPTH" -1 2); do
              SRC=$(rollback_name "$((i-1))")
              DST=$(rollback_name "$i")
              if "$DOCKER_BIN" ps -a --format '{{.Names}}' | grep -Fx "$SRC" >/dev/null 2>&1; then
                "$DOCKER_BIN" rename "$SRC" "$DST"
              fi
            done

            FIRST_ROLLBACK=$(rollback_name 1)
            HAS_ROLLBACK=0
            if "$DOCKER_BIN" ps -a --format '{{.Names}}' | grep -Fx "${{ env.CONTAINER_NAME }}" >/dev/null 2>&1; then
              "$DOCKER_BIN" stop ${{ env.CONTAINER_NAME }} >/dev/null 2>&1 || true
              "$DOCKER_BIN" rename ${{ env.CONTAINER_NAME }} "$FIRST_ROLLBACK"
              HAS_ROLLBACK=1
            fi

            # Run the new container
            "$DOCKER_BIN" run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              --user 10001:10001 \
              --read-only \
              --tmpfs /tmp:rw,noexec,nosuid,size=64m \
              --security-opt no-new-privileges:true \
              --cap-drop ALL \
              --pids-limit 200 \
              --memory 512m \
              --memory-swap 512m \
              --cpus 1.0 \
              --ulimit nofile=1024:2048 \
              --ulimit nproc=256 \
              -p 9696:5000 \
              -v /share/Container/travel-quizzer/database:/app/database \
              -v /share/Container/travel-quizzer/data:/app/data:ro \
              -v /share/Container/travel-quizzer/media:/app/media:ro \
              -e SECRET_KEY="${{ secrets.FLASK_SECRET_KEY }}" \
              ${{ needs.build-and-push.outputs.image_ref }}

            # Wait for app readiness using an explicit in-container probe.
            echo "Waiting for container to become ready..."
            READY=0
            for i in $(seq 1 24); do
              if "$DOCKER_BIN" exec ${{ env.CONTAINER_NAME }} python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5)" >/dev/null 2>&1; then
                echo "Container is ready!"
                READY=1
                break
              fi
              echo "  Attempt $i/24: not ready yet"
              sleep 5
            done

            if [ "$READY" -ne 1 ]; then
              echo "Container did not become ready within timeout."
              "$DOCKER_BIN" logs --tail 60 ${{ env.CONTAINER_NAME }}
              echo "Manual health probe output:"
              "$DOCKER_BIN" exec ${{ env.CONTAINER_NAME }} python3 -c "import urllib.request; print(urllib.request.urlopen('http://localhost:5000/health', timeout=5).read().decode('utf-8'))" || true
              "$DOCKER_BIN" rm -f ${{ env.CONTAINER_NAME }} >/dev/null 2>&1 || true

              if [ "$HAS_ROLLBACK" -eq 1 ]; then
                echo "Attempting rollback to generation 1..."
                "$DOCKER_BIN" rename "$FIRST_ROLLBACK" ${{ env.CONTAINER_NAME }}
                "$DOCKER_BIN" start ${{ env.CONTAINER_NAME }}
                if "$DOCKER_BIN" exec ${{ env.CONTAINER_NAME }} python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5)" >/dev/null 2>&1; then
                  echo "Rollback succeeded and previous container is healthy."
                else
                  echo "Rollback container started, but health probe failed."
                fi
              fi
              exit 1
            fi

      - name: Seed database
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.QNAP_HOST }}
          port: ${{ secrets.QNAP_SSH_PORT }}
          username: ${{ secrets.QNAP_USER }}
          key: ${{ secrets.QNAP_SSH_KEY }}
          script: |
            resolve_docker() {
              if command -v docker >/dev/null 2>&1; then
                command -v docker
                return 0
              fi
              for candidate in \
                /share/CACHEDEV2_DATA/.qpkg/container-station/bin/docker \
                /share/CACHEDEV2_DATA/.qpkg/ContainerStation/bin/docker; do
                if [ -x "$candidate" ]; then
                  echo "$candidate"
                  return 0
                fi
              done
              echo "Docker CLI not found on QNAP host" >&2
              return 1
            }

            DOCKER_BIN=$(resolve_docker)
            "$DOCKER_BIN" exec ${{ env.CONTAINER_NAME }} /app/.venv/bin/python -m scripts.seed_db

      - name: Verify deployment
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.QNAP_HOST }}
          port: ${{ secrets.QNAP_SSH_PORT }}
          username: ${{ secrets.QNAP_USER }}
          key: ${{ secrets.QNAP_SSH_KEY }}
          script: |
            resolve_docker() {
              if command -v docker >/dev/null 2>&1; then
                command -v docker
                return 0
              fi
              for candidate in \
                /share/CACHEDEV2_DATA/.qpkg/container-station/bin/docker \
                /share/CACHEDEV2_DATA/.qpkg/ContainerStation/bin/docker; do
                if [ -x "$candidate" ]; then
                  echo "$candidate"
                  return 0
                fi
              done
              echo "Docker CLI not found on QNAP host" >&2
              return 1
            }

            DOCKER_BIN=$(resolve_docker)

            # Surface recent runtime logs and fail fast on obvious startup errors.
            LOG_TAIL=$("$DOCKER_BIN" logs --tail 120 ${{ env.CONTAINER_NAME }} 2>&1 || true)
            echo "Recent container logs (tail 120):"
            echo "$LOG_TAIL"
            if printf '%s\n' "$LOG_TAIL" | grep -Eiq 'Traceback \(most recent call last\)|Exception:'; then
              echo "Detected exception traceback patterns in container logs after deploy."
              exit 1
            fi

            # Confirm the app responds on a public endpoint
            RESPONSE=$("$DOCKER_BIN" exec ${{ env.CONTAINER_NAME }} python3 -c "import urllib.request; print(urllib.request.urlopen('http://localhost:5000/health', timeout=5).read().decode('utf-8'))")
            if [ -z "$RESPONSE" ]; then
              echo "Health endpoint returned empty response after seeding."
              exit 1
            fi
            echo "Deployment verified. Health response:"
            echo "$RESPONSE" | head -c 200
            echo ""

            # Clean up old images
            "$DOCKER_BIN" image prune -f

      - name: Notify on deployment failure
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[deploy] QNAP deployment failed (${context.ref.replace('refs/tags/', '')})`;
            const body = [
              `Workflow run failed for ${context.ref}.`,
              '',
              `Run URL: ${runUrl}`,
              `Commit: ${context.sha}`,
              `Actor: ${context.actor}`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['incident', 'deployment'],
            });
