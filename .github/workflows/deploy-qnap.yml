name: Deploy to QNAP Container Station

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  CONTAINER_NAME: travel-quizzer

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to QNAP via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QNAP_HOST }}
          port: ${{ secrets.QNAP_SSH_PORT }}
          username: ${{ secrets.QNAP_USER }}
          key: ${{ secrets.QNAP_SSH_KEY }}
          script: |
            resolve_docker() {
              if command -v docker >/dev/null 2>&1; then
                command -v docker
                return 0
              fi
              for candidate in \
                /share/CACHEDEV2_DATA/.qpkg/container-station/bin/docker \
                /share/CACHEDEV2_DATA/.qpkg/ContainerStation/bin/docker; do
                if [ -x "$candidate" ]; then
                  echo "$candidate"
                  return 0
                fi
              done
              echo "Docker CLI not found on QNAP host" >&2
              return 1
            }

            DOCKER_BIN=$(resolve_docker)

            # Log in to GHCR
            echo "${{ secrets.QNAP_GHCR_TOKEN }}" | "$DOCKER_BIN" login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the latest image
            "$DOCKER_BIN" pull ${{ env.IMAGE_NAME }}:latest

            # Stop and remove existing container (if running)
            "$DOCKER_BIN" stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            "$DOCKER_BIN" rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            # Run the new container
            "$DOCKER_BIN" run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 9696:5000 \
              -v /share/Container/travel-quizzer/database:/app/database \
              -v /share/Container/travel-quizzer/data:/app/data:ro \
              -v /share/Container/travel-quizzer/media:/app/media:ro \
              -e SECRET_KEY="${{ secrets.FLASK_SECRET_KEY }}" \
              --health-cmd "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=3)\"" \
              --health-interval 10s \
              --health-timeout 5s \
              --health-retries 8 \
              --health-start-period 20s \
              ${{ env.IMAGE_NAME }}:latest

            # Wait for container to become healthy
            echo "Waiting for container to become healthy..."
            for i in $(seq 1 12); do
              STATUS=$("$DOCKER_BIN" inspect --format='{{.State.Health.Status}}' ${{ env.CONTAINER_NAME }} 2>/dev/null || echo "unknown")
              echo "  Attempt $i/12: status=$STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "Container is healthy!"
                break
              fi
              if [ "$STATUS" = "unhealthy" ]; then
                echo "Container is unhealthy. Fetching logs..."
                "$DOCKER_BIN" logs --tail 30 ${{ env.CONTAINER_NAME }}
                echo "Healthcheck probe output:"
                "$DOCKER_BIN" inspect --format='{{range .State.Health.Log}}{{println .ExitCode "|" .Output}}{{end}}' ${{ env.CONTAINER_NAME }} || true
                echo "Manual health probe from inside container:"
                "$DOCKER_BIN" exec ${{ env.CONTAINER_NAME }} python3 -c "import urllib.request; print(urllib.request.urlopen('http://localhost:5000/health', timeout=5).read().decode('utf-8'))" || true
                exit 1
              fi
              sleep 10
            done

            # Final check
            STATUS=$("$DOCKER_BIN" inspect --format='{{.State.Health.Status}}' ${{ env.CONTAINER_NAME }} 2>/dev/null || echo "unknown")
            if [ "$STATUS" != "healthy" ]; then
              echo "Container did not become healthy within timeout."
              "$DOCKER_BIN" logs --tail 30 ${{ env.CONTAINER_NAME }}
              echo "Healthcheck probe output:"
              "$DOCKER_BIN" inspect --format='{{range .State.Health.Log}}{{println .ExitCode "|" .Output}}{{end}}' ${{ env.CONTAINER_NAME }} || true
              echo "Manual health probe from inside container:"
              "$DOCKER_BIN" exec ${{ env.CONTAINER_NAME }} python3 -c "import urllib.request; print(urllib.request.urlopen('http://localhost:5000/health', timeout=5).read().decode('utf-8'))" || true
              exit 1
            fi

      - name: Seed database
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QNAP_HOST }}
          port: ${{ secrets.QNAP_SSH_PORT }}
          username: ${{ secrets.QNAP_USER }}
          key: ${{ secrets.QNAP_SSH_KEY }}
          script: |
            resolve_docker() {
              if command -v docker >/dev/null 2>&1; then
                command -v docker
                return 0
              fi
              for candidate in \
                /share/CACHEDEV2_DATA/.qpkg/container-station/bin/docker \
                /share/CACHEDEV2_DATA/.qpkg/ContainerStation/bin/docker; do
                if [ -x "$candidate" ]; then
                  echo "$candidate"
                  return 0
                fi
              done
              echo "Docker CLI not found on QNAP host" >&2
              return 1
            }

            DOCKER_BIN=$(resolve_docker)
            "$DOCKER_BIN" exec ${{ env.CONTAINER_NAME }} uv run --no-project python -m scripts.seed_db

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QNAP_HOST }}
          port: ${{ secrets.QNAP_SSH_PORT }}
          username: ${{ secrets.QNAP_USER }}
          key: ${{ secrets.QNAP_SSH_KEY }}
          script: |
            resolve_docker() {
              if command -v docker >/dev/null 2>&1; then
                command -v docker
                return 0
              fi
              for candidate in \
                /share/CACHEDEV2_DATA/.qpkg/container-station/bin/docker \
                /share/CACHEDEV2_DATA/.qpkg/ContainerStation/bin/docker; do
                if [ -x "$candidate" ]; then
                  echo "$candidate"
                  return 0
                fi
              done
              echo "Docker CLI not found on QNAP host" >&2
              return 1
            }

            DOCKER_BIN=$(resolve_docker)

            # Confirm the API responds with quiz data
            RESPONSE=$("$DOCKER_BIN" exec ${{ env.CONTAINER_NAME }} python3 -c "import urllib.request; print(urllib.request.urlopen('http://localhost:5000/api/quiz', timeout=5).read().decode('utf-8'))")
            if [ -z "$RESPONSE" ]; then
              echo "API returned empty response after seeding."
              exit 1
            fi
            echo "Deployment verified. API response:"
            echo "$RESPONSE" | head -c 200
            echo ""

            # Clean up old images
            "$DOCKER_BIN" image prune -f
