name: Deploy to QNAP Container Station

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  CONTAINER_NAME: travel-quizzer

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to QNAP via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QNAP_HOST }}
          port: ${{ secrets.QNAP_SSH_PORT }}
          username: ${{ secrets.QNAP_USER }}
          key: ${{ secrets.QNAP_SSH_KEY }}
          script: |
            # Log in to GHCR
            echo "${{ secrets.QNAP_GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the latest image
            docker pull ${{ env.IMAGE_NAME }}:latest

            # Stop and remove existing container (if running)
            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            # Run the new container
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 9696:5000 \
              -v /share/Container/travel-quizzer/database:/app/database \
              -v /share/Container/travel-quizzer/data:/app/data:ro \
              -v /share/Container/travel-quizzer/media:/app/media:ro \
              -e SECRET_KEY="${{ secrets.FLASK_SECRET_KEY }}" \
              --health-cmd "curl -f http://localhost:5000/api/quiz || exit 1" \
              --health-interval 10s \
              --health-timeout 5s \
              --health-retries 5 \
              --health-start-period 10s \
              ${{ env.IMAGE_NAME }}:latest

            # Wait for container to become healthy
            echo "Waiting for container to become healthy..."
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' ${{ env.CONTAINER_NAME }} 2>/dev/null || echo "unknown")
              echo "  Attempt $i/12: status=$STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "Container is healthy!"
                break
              fi
              if [ "$STATUS" = "unhealthy" ]; then
                echo "Container is unhealthy. Fetching logs..."
                docker logs --tail 30 ${{ env.CONTAINER_NAME }}
                exit 1
              fi
              sleep 10
            done

            # Final check
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' ${{ env.CONTAINER_NAME }} 2>/dev/null || echo "unknown")
            if [ "$STATUS" != "healthy" ]; then
              echo "Container did not become healthy within timeout."
              docker logs --tail 30 ${{ env.CONTAINER_NAME }}
              exit 1
            fi

      - name: Seed database
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QNAP_HOST }}
          port: ${{ secrets.QNAP_SSH_PORT }}
          username: ${{ secrets.QNAP_USER }}
          key: ${{ secrets.QNAP_SSH_KEY }}
          script: |
            docker exec ${{ env.CONTAINER_NAME }} uv run --no-project python -m scripts.seed_db

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QNAP_HOST }}
          port: ${{ secrets.QNAP_SSH_PORT }}
          username: ${{ secrets.QNAP_USER }}
          key: ${{ secrets.QNAP_SSH_KEY }}
          script: |
            # Confirm the API responds with quiz data
            RESPONSE=$(docker exec ${{ env.CONTAINER_NAME }} curl -sf http://localhost:5000/api/quiz)
            if [ -z "$RESPONSE" ]; then
              echo "API returned empty response after seeding."
              exit 1
            fi
            echo "Deployment verified. API response:"
            echo "$RESPONSE" | head -c 200
            echo ""

            # Clean up old images
            docker image prune -f
