name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Run tests
        env:
          QUIZ_DATABASE_URL: sqlite:///./data/ci_quiz_data.db
        run: uv run unit-test
