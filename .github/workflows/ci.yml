name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run hardening policy checks
        run: python3 scripts/check_hardening.py

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ensure database directory exists
        run: mkdir -p database

      - name: Run tests
        env:
          QUIZ_DATABASE_URL: sqlite:///./database/ci_quiz_data.db
        run: uv run unit-test

      - name: Generate repository SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: spdx-json
          artifact-name: source-sbom.spdx.json
          upload-release-assets: false
