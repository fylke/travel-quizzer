<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Travel Quiz</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .reset-container {
            max-width: 400px;
            margin: 80px auto;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .reset-container h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #333;
        }

        .reset-form .input-group {
            margin-bottom: 1rem;
        }

        .reset-form label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            color: #555;
            font-size: 0.9em;
        }

        .reset-form input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .reset-form input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .reset-form .btn-primary {
            width: 100%;
            margin-top: 1rem;
        }

        .form-error {
            color: #f44336;
            font-size: 0.85em;
            margin-top: 0.5rem;
            display: block;
        }

        .error-message {
            text-align: center;
            color: #f44336;
            padding: 1rem;
        }

        .error-message a {
            color: #667eea;
            text-decoration: underline;
        }

        .success-message {
            text-align: center;
            color: #4caf50;
            padding: 1rem;
        }

        .success-message a {
            display: inline-block;
            margin-top: 1rem;
            color: #667eea;
            text-decoration: underline;
            font-weight: 600;
        }

        .loading-message {
            text-align: center;
            color: #666;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <h1>✈️ Reset Password</h1>

        <div id="loadingState" class="loading-message">
            Validating your reset link...
        </div>

        <div id="errorState" style="display: none;">
            <div class="error-message">
                <p id="tokenErrorMessage">This reset link is no longer valid or has expired.</p>
                <p><a href="/">Request a new reset email</a></p>
            </div>
        </div>

        <div id="formState" style="display: none;">
            <form id="resetForm" class="reset-form" novalidate>
                <div class="input-group">
                    <label for="newPassword">New Password</label>
                    <input
                        type="password"
                        id="newPassword"
                        placeholder="Enter new password (min 8 characters)"
                        maxlength="128"
                        autocomplete="new-password"
                    >
                    <div id="passwordStrengthContainer" class="password-strength-container hidden">
                        <div class="password-strength-bar">
                            <div id="passwordStrengthFill" class="password-strength-fill"></div>
                        </div>
                        <span id="passwordStrengthLabel" class="password-strength-label"></span>
                    </div>
                </div>
                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm new password"
                        maxlength="128"
                        autocomplete="new-password"
                    >
                </div>
                <span id="resetFormError" class="form-error" role="alert"></span>
                <button type="submit" class="btn btn-primary">Reset Password</button>
            </form>
        </div>

        <div id="successState" style="display: none;">
            <div class="success-message">
                <p>Your password has been reset successfully.</p>
                <a href="/">Back to login</a>
            </div>
        </div>
    </div>

    <script>
        // Password strength function (same logic as registration form)
        function getPasswordStrength(password) {
            if (!password) return { level: 0, label: '' };
            let score = 0;
            if (password.length >= 8) score++;
            if (password.length >= 12) score++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
            if (/\d/.test(password)) score++;
            if (/[^a-zA-Z0-9]/.test(password)) score++;

            if (password.length < 8) return { level: 1, label: 'Too short' };
            if (score <= 2) return { level: 1, label: 'Weak' };
            if (score === 3) return { level: 2, label: 'Fair' };
            if (score === 4) return { level: 3, label: 'Good' };
            return { level: 4, label: 'Strong' };
        }

        function updatePasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const container = document.getElementById('passwordStrengthContainer');
            const fill = document.getElementById('passwordStrengthFill');
            const label = document.getElementById('passwordStrengthLabel');

            if (!password) {
                container.classList.add('hidden');
                return;
            }

            container.classList.remove('hidden');
            const strength = getPasswordStrength(password);
            const classes = ['strength-weak', 'strength-fair', 'strength-good', 'strength-strong'];
            const strengthClass = classes[strength.level - 1] || '';

            fill.className = 'password-strength-fill ' + strengthClass;
            label.className = 'password-strength-label ' + strengthClass;
            label.textContent = strength.label;
        }

        // State management
        let resetToken = null;

        function showState(stateId) {
            ['loadingState', 'errorState', 'formState', 'successState'].forEach(function(id) {
                document.getElementById(id).style.display = 'none';
            });
            document.getElementById(stateId).style.display = '';
        }

        function showFormError(message) {
            const errorEl = document.getElementById('resetFormError');
            errorEl.textContent = message;
        }

        function clearFormError() {
            document.getElementById('resetFormError').textContent = '';
        }

        // Token validation on page load
        document.addEventListener('DOMContentLoaded', async function() {
            const params = new URLSearchParams(window.location.search);
            resetToken = params.get('token');

            if (!resetToken) {
                showState('errorState');
                return;
            }

            try {
                const response = await fetch('/api/reset-password/validate?token=' + encodeURIComponent(resetToken));
                if (response.ok) {
                    showState('formState');
                } else {
                    showState('errorState');
                }
            } catch (err) {
                showState('errorState');
            }
        });

        // Password strength on keystroke
        document.getElementById('newPassword').addEventListener('input', updatePasswordStrength);

        // Form submission
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearFormError();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Client-side validation
            if (!newPassword || !confirmPassword) {
                showFormError('Please fill in both password fields.');
                return;
            }

            if (newPassword.length < 8) {
                showFormError('Password must be at least 8 characters.');
                return;
            }

            if (newPassword !== confirmPassword) {
                showFormError('Passwords do not match.');
                return;
            }

            // Submit to server
            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, password: newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showState('successState');
                } else {
                    showFormError(data.error || 'Failed to reset password. Please try again.');
                }
            } catch (err) {
                showFormError('A network error occurred. Please check your connection and try again.');
            }
        });
    </script>
</body>
</html>
