<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Quiz - Guess the Destination</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div id="welcomeScreen" class="screen">
            <div class="welcome-content">
                <h1 id="authHeading">✈️ Travel Quiz</h1>
                <p id="authSubtext">Log in or create an account to continue.</p>
                
                <div class="input-group auth-group">
                    <input 
                        type="text" 
                        id="name" 
                        placeholder="Enter your name" 
                        maxlength="20"
                        class="hidden"
                    >
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="Enter your email" 
                        maxlength="100"
                    >
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Enter your password" 
                        maxlength="50"
                    >
                    <button onclick="handleAuth()" class="btn btn-primary" id="authButton">Log In</button>
                </div>

                <div class="button-group auth-toggle-group">
                    <button onclick="toggleAuthMode('register')" class="btn btn-secondary" id="switchToRegister">Create an account</button>
                    <button onclick="toggleAuthMode('login')" class="btn btn-secondary hidden" id="switchToLogin">Already have an account?</button>
                </div>

                <div id="loadingMessage" class="loading-message" style="display: none;">
                    Loading quiz...
                </div>
            </div>
        </div>

        <div id="statusScreen" class="screen hidden">
            <div class="status-content">
                <h1>📊 Your Quiz Status</h1>
                <div class="stats-section">
                    <div class="stat-card">
                        <span class="stat-label">Quizzes Completed</span>
                        <span id="statsCompleted" class="stat-value">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Total Points</span>
                        <span id="statsPoints" class="stat-value">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Ongoing Quizzes</span>
                        <span id="statsOngoing" class="stat-value">0</span>
                    </div>
                </div>

                <div class="quiz-actions">
                    <div class="specific-quiz-section">
                        <label for="specificQuizId">Run a specific quiz (enter ID):</label>
                        <div class="input-row">
                            <input type="number" id="specificQuizId" placeholder="Quiz ID" min="1">
                            <button onclick="runSpecificQuiz()" class="btn btn-primary" id="runSpecificQuizBtn">Run Specific Quiz</button>
                        </div>
                    </div>
                    <button onclick="runRandomQuiz()" class="btn btn-primary" id="runRandomQuizBtn">Run Random Quiz</button>
                    <button onclick="handleLogout()" class="btn btn-secondary" id="logoutBtn">Logout</button>
                </div>
            </div>
        </div>

        <div id="quizScreen" class="screen hidden">
            <div class="quiz-header">
                <div class="progress-info">
                    <span>Question <span id="currentQuestion">1</span> of 5</span>
                    <span id="scoreDisplay">Score: 0</span>
                </div>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
            </div>

            <div class="quiz-content">
                <div class="hint-section">
                    <h2 id="hint"></h2>
                </div>

                <div class="images-section">
                    <div class="image-container">
                        <img id="image1" src="" alt="Destination image 1" class="quiz-image">
                    </div>
                    <div class="image-container">
                        <img id="image2" src="" alt="Destination image 2" class="quiz-image">
                    </div>
                </div>
                <div class="hint-meta">
                    <span id="hintProgress"></span>
                    <span id="hintPoints"></span>
                    </div>

                <div class="answer-section">
                    <input 
                        type="text" 
                        id="answerInput" 
                        placeholder="Enter the destination" 
                        autocomplete="off"
                    >
                    <div class="button-group">
                        <button onclick="submitAnswer()" class="btn btn-primary">Submit Answer</button>
                        <button onclick="skipHint()" class="btn btn-secondary">Skip Hint</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="feedbackScreen" class="screen hidden">
            <div class="feedback-content">
                <div id="feedbackStatus" class="feedback-status"></div>
                <div id="feedbackDetails" class="feedback-details"></div>
                <button onclick="backToStatus()" class="btn btn-primary">Back to Status</button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" class="screen hidden">
            <div class="results-content">
                <h1>Quiz Complete! 🎉</h1>
                <div class="final-score">
                    <p>Your Score</p>
                    <p id="finalScore" class="score-number">0</p>
                </div>
                <div class="results-details">
                    <p id="resultsMessage"></p>
                </div>
                <div class="button-group">
                    <button onclick="retakeQuiz()" class="btn btn-primary">Retake Quiz</button>
                    <button onclick="backToStatus()" class="btn btn-secondary">Back to Status</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
